# ============================================================
#  Snowman Enterprise App — Azure DevOps Unified CI/CD Pipeline
#  Target  : Self-Hosted Agent VM  (Docker + k3s/kubeadm)
#  Registry: Azure Container Registry (ACR)
#  Stack   : Java/Maven · MySQL 5.7 · ActiveMQ · Liquibase · NGINX
# ============================================================
#
#  Required ADO Variable Group  : snowman-variable-group
#  Required ADO Service Connections:
#    - "ACR-ServiceConnection"   (Docker Registry → ACR)
#    - "Azure-ServiceConnection" (Azure Resource Manager → Service Principal)
#
#  Variable Group must contain (mark secrets as secret):
#    ACR_NAME              e.g. yourregistry
#    ACR_LOGIN_SERVER      e.g. yourregistry.azurecr.io
#    ACR_USERNAME          (secret) from ACR Access Keys
#    ACR_PASSWORD          (secret) from ACR Access Keys
#    DB_HOST               Azure MySQL Flexible Server FQDN  OR  "mysql" for in-cluster
#    DB_NAME               snowman
#    DB_USER               snowman_user
#    DB_PASSWORD           (secret)
#    DB_ROOT_PASSWORD      (secret)
#    ACTIVEMQ_HOST         activemq  (in-cluster service name)
#    ACTIVEMQ_PORT         61616
#    ACTIVEMQ_ADMIN_USER   admin
#    ACTIVEMQ_ADMIN_PASS   (secret)
#    AZURE_KEYVAULT_URI    https://your-kv.vault.azure.net/
#    K8S_NAMESPACE         snowman
# ============================================================

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - README.md
      - docs/**

pr:
  branches:
    include:
      - main

pool:
  name: 'SelfHostedAgentPool'      # ← your self-hosted agent pool name

variables:
  - group: snowman-variable-group
  - name: IMAGE_NAME
    value: 'snowman-app'
  - name: IMAGE_TAG
    value: '$(Build.BuildId)'
  - name: K8S_NAMESPACE
    value: 'snowman'
  - name: MAVEN_CACHE_FOLDER
    value: $(Pipeline.Workspace)/.m2/repository
  - name: MAVEN_OPTS
    value: '-Dmaven.repo.local=$(MAVEN_CACHE_FOLDER)'

# ============================================================
# STAGE 1 — BUILD & UNIT TEST
# ============================================================
stages:
  - stage: Build
    displayName: '1 · Build & Test'
    jobs:
      - job: MavenBuild
        displayName: 'Maven build · unit tests · code coverage'
        steps:

          - task: Cache@2
            displayName: 'Cache Maven local repo'
            inputs:
              key: 'maven | "$(Agent.OS)" | **/pom.xml'
              restoreKeys: |
                maven | "$(Agent.OS)"
                maven
              path: $(MAVEN_CACHE_FOLDER)

          - task: Maven@4
            displayName: 'mvn clean verify'
            inputs:
              mavenPomFile: 'pom.xml'
              goals: 'clean verify'
              options: '-B $(MAVEN_OPTS) -Dspring.profiles.active=test'
              publishJUnitResults: true
              testResultsFiles: '**/surefire-reports/TEST-*.xml'
              codeCoverageToolOption: 'JaCoCo'
              codeCoverageClassFilter: '+:com.snowman.*,-:com.snowman.*.config.*'
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '1.17'

          - task: PublishCodeCoverageResults@1
            displayName: 'Publish JaCoCo coverage'
            inputs:
              codeCoverageTool: 'JaCoCo'
              summaryFileLocation: '**/jacoco.xml'
              reportDirectory: '**/site/jacoco'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish JAR artifact'
            inputs:
              targetPath: 'target'
              artifact: 'app-jar'
              publishLocation: 'pipeline'

# ============================================================
# STAGE 2 — DOCKER BUILD & PUSH TO ACR
# ============================================================
  - stage: DockerBuildPush
    displayName: '2 · Docker Build & Push to ACR'
    dependsOn: Build
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: DockerJob
        displayName: 'Build image · push to ACR'
        steps:

          - download: current
            artifact: app-jar
            displayName: 'Download JAR artifact'

          - script: |
              mkdir -p target
              cp $(Pipeline.Workspace)/app-jar/*.jar target/
            displayName: 'Place JAR for Docker build context'

          # ── ACR Login ──────────────────────────────────────
          - task: Docker@2
            displayName: 'ACR Login'
            inputs:
              command: 'login'
              containerRegistry: 'ACR-ServiceConnection'

          # ── Build snowman-app image ────────────────────────
          - task: Docker@2
            displayName: 'Build snowman-app image'
            inputs:
              command: 'build'
              Dockerfile: 'docker/Dockerfile'
              repository: '$(ACR_LOGIN_SERVER)/$(IMAGE_NAME)'
              tags: |
                $(IMAGE_TAG)
                latest
              arguments: '--no-cache --build-arg BUILD_DATE=$(Build.BuildId)'

          # ── Push to ACR ────────────────────────────────────
          - task: Docker@2
            displayName: 'Push to ACR'
            inputs:
              command: 'push'
              containerRegistry: 'ACR-ServiceConnection'
              repository: '$(IMAGE_NAME)'
              tags: |
                $(IMAGE_TAG)
                latest

          # ── Trivy security scan ────────────────────────────
          - script: |
              echo "Installing Trivy..."
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
              trivy image \
                --exit-code 0 \
                --severity HIGH,CRITICAL \
                --format table \
                $(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$(IMAGE_TAG)
            displayName: 'Trivy image vulnerability scan'
            continueOnError: true

          # ── Publish K8s manifests for CD stage ────────────
          - task: PublishPipelineArtifact@1
            displayName: 'Publish K8s manifests'
            inputs:
              targetPath: 'k8s'
              artifact: 'k8s-manifests'
              publishLocation: 'pipeline'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish docker-compose (for reference)'
            inputs:
              targetPath: 'docker/local'
              artifact: 'docker-compose'
              publishLocation: 'pipeline'

# ============================================================
# STAGE 3 — DATABASE MIGRATION (Liquibase via kubectl Job)
# ============================================================
  - stage: DBMigration
    displayName: '3 · Liquibase DB Migration'
    dependsOn: DockerBuildPush
    condition: succeeded()
    jobs:
      - deployment: LiquibaseMigrate
        displayName: 'Run Liquibase migration on Azure MySQL'
        environment: 'snowman-production'
        strategy:
          runOnce:
            deploy:
              steps:

                - task: AzureKeyVault@2
                  displayName: 'Fetch DB secrets from Key Vault'
                  inputs:
                    azureSubscription: 'Azure-ServiceConnection'
                    KeyVaultName: '$(AZURE_KEYVAULT_URI)'
                    SecretsFilter: 'DB-PASSWORD,DB-USER,DB-HOST,DB-NAME'
                    RunAsPreJob: true

                - download: current
                  artifact: k8s-manifests
                  displayName: 'Download K8s manifests'

                # Run Liquibase as a one-off kubectl Job
                - script: |
                    cat <<EOF | kubectl apply -f -
                    apiVersion: batch/v1
                    kind: Job
                    metadata:
                      name: liquibase-migrate-$(Build.BuildId)
                      namespace: $(K8S_NAMESPACE)
                    spec:
                      ttlSecondsAfterFinished: 300
                      template:
                        spec:
                          restartPolicy: OnFailure
                          containers:
                            - name: liquibase
                              image: liquibase/liquibase:4.25
                              command:
                                - liquibase
                                - --url=jdbc:mysql://$(DB_HOST):3306/$(DB_NAME)?useSSL=true&requireSSL=true
                                - --username=$(DB_USER)
                                - --password=$(DB_PASSWORD)
                                - --changeLogFile=db/changelog/db.changelog-master.xml
                                - update
                              env:
                                - name: JAVA_OPTS
                                  value: "-Xmx256m"
                              volumeMounts:
                                - name: changelog
                                  mountPath: /liquibase/changelog
                          volumes:
                            - name: changelog
                              configMap:
                                name: liquibase-changelog
                    EOF

                    echo "Waiting for Liquibase job to complete..."
                    kubectl wait job/liquibase-migrate-$(Build.BuildId) \
                      --for=condition=complete \
                      --timeout=300s \
                      --namespace=$(K8S_NAMESPACE)

                    echo "=== Liquibase Job Logs ==="
                    kubectl logs -l job-name=liquibase-migrate-$(Build.BuildId) \
                      --namespace=$(K8S_NAMESPACE)
                  displayName: 'Apply Liquibase migration Job'

# ============================================================
# STAGE 4 — DEPLOY TO AGENT VM (kubectl apply)
# ============================================================
  - stage: Deploy
    displayName: '4 · Deploy to Agent VM K8s'
    dependsOn: DBMigration
    condition: succeeded()
    jobs:
      - deployment: K8sDeploy
        displayName: 'kubectl apply → rolling deploy'
        environment: 'snowman-production'
        strategy:
          runOnce:
            deploy:
              steps:

                - task: AzureKeyVault@2
                  displayName: 'Fetch all secrets from Key Vault'
                  inputs:
                    azureSubscription: 'Azure-ServiceConnection'
                    KeyVaultName: '$(AZURE_KEYVAULT_URI)'
                    SecretsFilter: '*'
                    RunAsPreJob: true

                - download: current
                  artifact: k8s-manifests
                  displayName: 'Download K8s manifests'

                # ── Create namespace ───────────────────────────
                - script: |
                    kubectl create namespace $(K8S_NAMESPACE) \
                      --dry-run=client -o yaml | kubectl apply -f -
                  displayName: 'Ensure namespace exists'

                # ── ACR image pull secret ─────────────────────
                - script: |
                    kubectl create secret docker-registry acr-pull-secret \
                      --docker-server=$(ACR_LOGIN_SERVER) \
                      --docker-username=$(ACR_USERNAME) \
                      --docker-password=$(ACR_PASSWORD) \
                      --namespace=$(K8S_NAMESPACE) \
                      --dry-run=client -o yaml | kubectl apply -f -
                  displayName: 'Create/update ACR pull secret'

                # ── App secrets (DB + ActiveMQ) ────────────────
                - script: |
                    kubectl create secret generic snowman-secrets \
                      --from-literal=DB_HOST="$(DB_HOST)" \
                      --from-literal=DB_NAME="$(DB_NAME)" \
                      --from-literal=DB_USER="$(DB_USER)" \
                      --from-literal=DB_PASSWORD="$(DB_PASSWORD)" \
                      --from-literal=DB_ROOT_PASSWORD="$(DB_ROOT_PASSWORD)" \
                      --from-literal=ACTIVEMQ_HOST="$(ACTIVEMQ_HOST)" \
                      --from-literal=ACTIVEMQ_PORT="$(ACTIVEMQ_PORT)" \
                      --from-literal=ACTIVEMQ_ADMIN_USER="$(ACTIVEMQ_ADMIN_USER)" \
                      --from-literal=ACTIVEMQ_ADMIN_PASS="$(ACTIVEMQ_ADMIN_PASS)" \
                      --namespace=$(K8S_NAMESPACE) \
                      --dry-run=client -o yaml | kubectl apply -f -
                  displayName: 'Create/update app secrets'

                # ── Substitute image tag in deployment YAML ────
                - script: |
                    MANIFEST_DIR="$(Pipeline.Workspace)/k8s-manifests"
                    sed -i \
                      "s|IMAGE_PLACEHOLDER|$(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$(IMAGE_TAG)|g" \
                      "$MANIFEST_DIR/deployment.yaml"
                    echo "--- deployment.yaml image line ---"
                    grep "image:" "$MANIFEST_DIR/deployment.yaml"
                  displayName: 'Inject ACR image tag into deployment.yaml'

                # ── Apply all manifests in order ──────────────
                - script: |
                    MANIFEST_DIR="$(Pipeline.Workspace)/k8s-manifests"

                    echo "==> ConfigMap"
                    kubectl apply -f "$MANIFEST_DIR/configmap.yaml"

                    echo "==> MySQL StatefulSet + Service (in-cluster)"
                    kubectl apply -f "$MANIFEST_DIR/mysql.yaml"

                    echo "==> ActiveMQ Deployment + Service"
                    kubectl apply -f "$MANIFEST_DIR/activemq.yaml"

                    echo "==> Snowman App Deployment"
                    kubectl apply -f "$MANIFEST_DIR/deployment.yaml"

                    echo "==> Snowman Service"
                    kubectl apply -f "$MANIFEST_DIR/service.yaml"

                    echo "==> NGINX Ingress"
                    kubectl apply -f "$MANIFEST_DIR/ingress.yaml"

                    echo "==> HPA"
                    kubectl apply -f "$MANIFEST_DIR/hpa.yaml"
                  displayName: 'kubectl apply all manifests'

                # ── Wait for rollout ───────────────────────────
                - script: |
                    echo "Waiting for snowman-app rollout..."
                    kubectl rollout status deployment/snowman-app \
                      --namespace=$(K8S_NAMESPACE) \
                      --timeout=300s
                  displayName: 'Wait for rollout to complete'

                # ── Health check after deploy ──────────────────
                - script: |
                    echo "=== Pods ==="
                    kubectl get pods -n $(K8S_NAMESPACE) -o wide

                    echo "=== Services ==="
                    kubectl get svc -n $(K8S_NAMESPACE)

                    echo "=== HPA ==="
                    kubectl get hpa -n $(K8S_NAMESPACE)

                    echo "=== Recent events ==="
                    kubectl get events -n $(K8S_NAMESPACE) \
                      --sort-by='.lastTimestamp' | tail -20

                    echo "=== App health endpoint ==="
                    NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
                    curl -sf "http://$NODE_IP:30080/actuator/health" \
                      && echo "Health check PASSED" \
                      || echo "Health check endpoint not yet ready (check pod logs)"
                  displayName: 'Post-deploy verification'

# ============================================================
# STAGE 5 — SMOKE TEST
# ============================================================
  - stage: SmokeTest
    displayName: '5 · Smoke Test'
    dependsOn: Deploy
    condition: succeeded()
    jobs:
      - job: SmokeJob
        displayName: 'Basic availability checks'
        steps:
          - script: |
              NODE_IP=$(kubectl get nodes -n $(K8S_NAMESPACE) \
                -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')

              echo "Testing app node 1 (port 30080)..."
              for i in 1 2 3; do
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                  "http://$NODE_IP:30080/actuator/health" || echo "000")
                echo "Attempt $i — HTTP $STATUS"
                [ "$STATUS" = "200" ] && break
                sleep 10
              done

              if [ "$STATUS" != "200" ]; then
                echo "SMOKE TEST FAILED — app not responding"
                kubectl logs -l app=snowman-app \
                  --namespace=$(K8S_NAMESPACE) --tail=50
                exit 1
              fi

              echo "Checking ActiveMQ admin UI (port 30161)..."
              AMQ_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                -u $(ACTIVEMQ_ADMIN_USER):$(ACTIVEMQ_ADMIN_PASS) \
                "http://$NODE_IP:30161/admin" || echo "000")
              echo "ActiveMQ admin HTTP $AMQ_STATUS"

              echo "All smoke tests passed."
            displayName: 'Availability smoke tests'

          - script: |
              echo "=== Final deployment summary ==="
              kubectl get all -n $(K8S_NAMESPACE)
            displayName: 'Print final deployment state'

# ============================================================
# STAGE 6 — ROLLBACK (manual trigger on failure)
# ============================================================
  - stage: Rollback
    displayName: '6 · Rollback (on-demand)'
    dependsOn: Deploy
    condition: failed()
    jobs:
      - job: RollbackJob
        displayName: 'kubectl rollout undo'
        steps:
          - script: |
              echo "Rolling back snowman-app to previous revision..."
              kubectl rollout undo deployment/snowman-app \
                --namespace=$(K8S_NAMESPACE)

              kubectl rollout status deployment/snowman-app \
                --namespace=$(K8S_NAMESPACE) \
                --timeout=180s

              echo "=== Post-rollback pods ==="
              kubectl get pods -n $(K8S_NAMESPACE)
            displayName: 'Automatic rollback on deploy failure'

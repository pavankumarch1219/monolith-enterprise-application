# ============================================================
# Snowman Enterprise App - GitHub Actions CI/CD Pipeline
# Triggers: push to main → build → test → deploy to AWS
# ============================================================
 
name: Snowman CI/CD Pipeline
 
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [dev, staging, prod]
 
env:
  JAVA_VERSION: '8'
  AWS_REGION: 'ap-south-1'
  ECR_REPOSITORY: 'snowman-app'
  S3_ARTIFACT_BUCKET: 'snowman-artifacts-prod'
 
jobs:
 
  # ─── STAGE 1: BUILD & TEST ──────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
 
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: snowman_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
 
      activemq:
        image: rmohr/activemq:5.15.9
        ports:
          - 61616:61616
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
 
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
 
      - name: Run Liquibase Migrations (Test DB)
        run: |
          mvn liquibase:update \
            -Dliquibase.url=jdbc:mysql://localhost:3306/snowman_test \
            -Dliquibase.username=test_user \
            -Dliquibase.password=test_pass
 
      - name: Compile source code
        run: mvn compile -B
 
      - name: Run Unit Tests
        run: mvn test -B
 
      - name: Run Integration Tests
        run: |
          mvn verify -B \
            -Ddb.url=jdbc:mysql://localhost:3306/snowman_test \
            -Ddb.username=test_user \
            -Ddb.password=test_pass \
            -Dmq.host=localhost \
            -Dmq.port=61616
 
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/*.xml
 
      - name: Build Uber JAR
        run: mvn package -DskipTests -B
 
      - name: Set artifact version
        id: version
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT
 
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: snowman-jar-${{ github.sha }}
          path: target/Snowman.jar
          retention-days: 30
 
  # ─── STAGE 2: CODE QUALITY ──────────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-and-test
 
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
 
      - name: Run SpotBugs Static Analysis
        run: mvn spotbugs:check -B || true
 
      - name: Run PMD Analysis
        run: mvn pmd:check -B || true
 
      - name: Run Checkstyle
        run: mvn checkstyle:check -B || true
 
  # ─── STAGE 3: DOCKER BUILD & PUSH ───────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Download built JAR
        uses: actions/download-artifact@v4
        with:
          name: snowman-jar-${{ github.sha }}
          path: target/
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
 
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
 
      - name: Build, tag and push Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f docker/Dockerfile -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $REGISTRY/$ECR_REPOSITORY:latest
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
 
      - name: Upload JAR to S3
        run: |
          aws s3 cp target/Snowman.jar \
            s3://${{ env.S3_ARTIFACT_BUCKET }}/releases/${{ github.sha }}/Snowman.jar
          aws s3 cp target/Snowman.jar \
            s3://${{ env.S3_ARTIFACT_BUCKET }}/releases/latest/Snowman.jar
 
  # ─── STAGE 4: DEPLOY TO STAGING ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: docker-build-push
    environment:
      name: staging
      url: http://staging.snowman.internal
 
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
 
      - name: Trigger Liquibase Migration (Staging)
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Environment,Values=staging" \
            --parameters 'commands=["cd /opt/snowman && mvn liquibase:update"]' \
            --region ${{ env.AWS_REGION }}
 
      - name: Instance Refresh - Staging ASG
        run: |
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name snowman-staging-asg \
            --strategy Rolling \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 120}' \
            --query 'InstanceRefreshId' \
            --output text)
          echo "Instance Refresh ID: $REFRESH_ID"
          # Wait for completion
          aws autoscaling wait instance-refresh-active \
            --auto-scaling-group-name snowman-staging-asg \
            --filters "Name=instance-refresh-id,Values=$REFRESH_ID" || true
 
      - name: Smoke Test Staging
        run: |
          sleep 60
          curl --fail --retry 5 --retry-delay 10 \
            http://${{ secrets.STAGING_ALB_DNS }}/health || exit 1
          echo "✅ Staging smoke test passed"
 
  # ─── STAGE 5: DEPLOY TO PRODUCTION ──────────────────────────────────────────
  deploy-prod:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: http://snowman.yourdomain.com
 
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
 
      - name: Run DB Migration (Production RDS)
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Environment,Values=prod" \
            --parameters 'commands=["cd /opt/snowman && mvn liquibase:update -Dliquibase.url=$DB_URL -Dliquibase.username=$DB_USER -Dliquibase.password=$DB_PASS"]' \
            --region ${{ env.AWS_REGION }}
 
      - name: Rolling Deploy - Production ASG
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name snowman-prod-asg \
            --strategy Rolling \
            --preferences '{"MinHealthyPercentage": 75, "InstanceWarmup": 180}' \
            --region ${{ env.AWS_REGION }}
 
      - name: Smoke Test Production
        run: |
          sleep 90
          curl --fail --retry 10 --retry-delay 15 \
            http://${{ secrets.PROD_ALB_DNS }}/health || exit 1
          echo "✅ Production deployment verified"
 
      - name: Notify Slack on Success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ Snowman v${{ github.sha }} deployed to PRODUCTION successfully!"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
 
      - name: Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ Snowman deployment to PRODUCTION FAILED! Commit: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
 

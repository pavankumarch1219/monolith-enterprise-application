trigger:
    - main
pool:
  name: 'agent-agni'      # ← your ADO agent pool name

# ── Variables (pulled from ADO Library Variable Group) ─────────
variables:
  - group: docker-credentials  # contains docker-credentials
  - name: IMAGE_NAME
    value: '$(DOCKERHUB_USERNAME)/snowman-app'
  - name: IMAGE_TAG
    value: '$(Build.BuildId)'
  - name: FULL_IMAGE
    value: '$(DOCKERHUB_USERNAME)/snowman-app:$(Build.BuildId)'
  - name: K8S_NAMESPACE
    value: 'snowman'

# ================================================================
# STAGE 1 — BUILD & TEST
# ================================================================
stages:
  - stage: Build
    displayName: '1 · Build & Test'
    jobs:
      - job: MavenBuild
        displayName: 'Maven clean verify'
        steps:

          # Cache Maven local repo to speed up subsequent runs
          - task: CacheBeta@1
            displayName: 'Cache Maven dependencies'
            inputs:
              key: 'maven | "$(Agent.OS)" | **/pom.xml'
              restoreKeys: 'maven | "$(Agent.OS)"'
              path: '$(HOME)/.m2/repository'

          - task: Maven@4
            displayName: 'Build · Unit Test · Package'
            inputs:
              mavenPomFile:       'pom.xml'
              goals:              'clean verify'
              options:            '-B -DskipITs=true'
              publishJUnitResults: true
              testResultsFiles:   '**/surefire-reports/TEST-*.xml'
              javaHomeOption:     'JDKVersion'
              jdkVersionOption:   '1.8'        # JDK 8 — matches Dockerfile
              mavenVersionOption: 'Default'

          - task: PublishCodeCoverageResults@1
            displayName: 'Publish JaCoCo coverage'
            inputs:
              codeCoverageTool:    'JaCoCo'
              summaryFileLocation: '**/jacoco.xml'
            continueOnError: true

          # Publish built JAR so Docker stage can pick it up
          - task: PublishPipelineArtifact@1
            displayName: 'Publish JAR artifact'
            inputs:
              targetPath:       'target'
              artifact:         'app-jar'
              publishLocation:  'pipeline'

          # Publish K8s manifests folder for deploy stage
          - task: PublishPipelineArtifact@1
            displayName: 'Publish K8s manifests'
            inputs:
              targetPath:       'k8s'
              artifact:         'k8s-manifests'
              publishLocation:  'pipeline'

          # Publish docker-compose + nginx for deploy stage
          - task: PublishPipelineArtifact@1
            displayName: 'Publish Docker Compose assets'
            inputs:
              targetPath:       'docker'
              artifact:         'docker-assets'
              publishLocation:  'pipeline'

# ================================================================
# STAGE 2 — DOCKER BUILD & PUSH TO DOCKERHUB
# ================================================================
  - stage: DockerBuildPush
    displayName: '2 · Docker Build & Push → DockerHub'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DockerJob
        displayName: 'Build image → push to DockerHub'
        steps:

          - download: current
            artifact: app-jar
            displayName: 'Download JAR from Build stage'

          # ── Login to DockerHub using docker-credentials ────
          - script: |
              echo "$(DOCKERHUB_PASSWORD)" | \
                docker login --username "$(DOCKERHUB_USERNAME)" --password-stdin
              echo "DockerHub login successful"
            displayName: 'Login to DockerHub'
            env:
              DOCKERHUB_PASSWORD: $(DOCKERHUB_PASSWORD)

          # ── Build image with two tags: BuildId + latest ────
          - script: |
              docker build \
                --no-cache \
                --file docker/Dockerfile \
                --tag $(IMAGE_NAME):$(IMAGE_TAG) \
                --tag $(IMAGE_NAME):latest \
                --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                --build-arg BUILD_ID="$(Build.BuildId)" \
                .
              echo "Image built: $(IMAGE_NAME):$(IMAGE_TAG)"
            displayName: 'Docker build'

          # ── Push both tags to DockerHub ────────────────────
          - script: |
              docker push $(IMAGE_NAME):$(IMAGE_TAG)
              docker push $(IMAGE_NAME):latest
              echo "Pushed: $(IMAGE_NAME):$(IMAGE_TAG)"
              echo "Pushed: $(IMAGE_NAME):latest"
            displayName: 'Docker push → DockerHub'

          # ── Clean up local image to free VM disk space ─────
          - script: |
              docker rmi $(IMAGE_NAME):$(IMAGE_TAG) $(IMAGE_NAME):latest || true
              docker image prune -f || true
            displayName: 'Prune local Docker images'

          # ── Logout cleanly ─────────────────────────────────
          - script: docker logout
            displayName: 'Docker logout'
            condition: always()

# ================================================================
# STAGE 3 — PRE-DEPLOY  (Namespace · Secrets · MySQL · ActiveMQ · Liquibase)
# ================================================================
  - stage: PreDeploy
    displayName: '3 · Pre-deploy Setup'
    dependsOn: DockerBuildPush
    condition: succeeded()
    jobs:
      - deployment: InfraSetup
        displayName: 'Namespace · Secrets · Infra services · DB migration'
        environment: 'snowman-production'
        strategy:
          runOnce:
            deploy:
              steps:

                # ── Namespace ──────────────────────────────────
                - script: |
                    kubectl create namespace $(K8S_NAMESPACE) \
                      --dry-run=client -o yaml | kubectl apply -f -
                    echo "Namespace $(K8S_NAMESPACE) ready"
                  displayName: 'Ensure K8s namespace exists'

                # ── DockerHub image-pull secret ────────────────
                # Needed only when DockerHub repo is private
                # Remove this step if your repo is public
                - script: |
                    kubectl create secret docker-registry dockerhub-pull-secret \
                      --docker-server=https://index.docker.io/v1/ \
                      --docker-username=$(DOCKERHUB_USERNAME) \
                      --docker-password=$(DOCKERHUB_PASSWORD) \
                      --namespace=$(K8S_NAMESPACE) \
                      --dry-run=client -o yaml | kubectl apply -f -
                    echo "DockerHub pull secret applied"
                  displayName: 'Create/update DockerHub pull secret'
                  env:
                    DOCKERHUB_PASSWORD: $(DOCKERHUB_PASSWORD)

                # ── App secrets (DB + ActiveMQ passwords) ──────
                - script: |
                    kubectl create secret generic snowman-app-secrets \
                      --from-literal=DB_ROOT_PASSWORD="$(DB_ROOT_PASSWORD)" \
                      --from-literal=DB_PASSWORD="$(DB_PASSWORD)" \
                      --from-literal=ACTIVEMQ_PASSWORD="$(ACTIVEMQ_PASSWORD)" \
                      --namespace=$(K8S_NAMESPACE) \
                      --dry-run=client -o yaml | kubectl apply -f -
                    echo "App secrets applied"
                  displayName: 'Create/update app secrets'

                # ── Deploy MySQL StatefulSet ───────────────────
                - script: |
                    kubectl apply \
                      -f $(Pipeline.Workspace)/k8s/mysql.yaml \
                      --namespace=$(K8S_NAMESPACE)

                    echo "Waiting for MySQL StatefulSet..."
                    kubectl rollout status statefulset/snowman-mysql \
                      --namespace=$(K8S_NAMESPACE) \
                      --timeout=180s
                    echo "MySQL ready"
                  displayName: 'Deploy MySQL StatefulSet'

                # ── Deploy ActiveMQ ────────────────────────────
                - script: |
                    kubectl apply \
                      -f $(Pipeline.Workspace)/k8s/activemq.yaml \
                      --namespace=$(K8S_NAMESPACE)

                    echo "Waiting for ActiveMQ..."
                    kubectl rollout status deployment/snowman-activemq \
                      --namespace=$(K8S_NAMESPACE) \
                      --timeout=120s
                    echo "ActiveMQ ready"
                  displayName: 'Deploy ActiveMQ'

                # ── Run Liquibase DB migration Job ─────────────
                - script: |
                    # Delete stale job if exists from previous run
                    kubectl delete job snowman-liquibase \
                      --namespace=$(K8S_NAMESPACE) \
                      --ignore-not-found=true

                    # Apply fresh job
                    kubectl apply \
                      -f $(Pipeline.Workspace)/k8s/liquibasejob.yaml \
                      --namespace=$(K8S_NAMESPACE)

                    echo "Waiting for Liquibase migration to complete..."
                    kubectl wait job/snowman-liquibase \
                      --for=condition=complete \
                      --namespace=$(K8S_NAMESPACE) \
                      --timeout=300s

                    echo "=== Migration logs ==="
                    kubectl logs job/snowman-liquibase \
                      --namespace=$(K8S_NAMESPACE) || true
                    echo "DB migration done"
                  displayName: 'Run Liquibase DB migration'

# ================================================================
# STAGE 4 — DEPLOY APP (Rolling update)
# ================================================================
  - stage: DeployApp
    displayName: '4 · Deploy Snowman App'
    dependsOn: PreDeploy
    condition: succeeded()
    jobs:
      - deployment: AppDeploy
        displayName: 'Rolling deploy → 2 replicas'
        environment: 'snowman-production'
        strategy:
          runOnce:
            deploy:
              steps:

                - download: current
                  artifact: k8s-manifests
                  displayName: 'Download K8s'

                # ── Inject DockerHub image tag into Deployment ─
                - script: |
                    MANIFEST=$(Pipeline.Workspace)/k8s/deployment.yaml

                    sed -i \
                      "s|IMAGE_PLACEHOLDER|$(IMAGE_NAME):$(IMAGE_TAG)|g" \
                      "$MANIFEST"

                    echo "Image injected: $(IMAGE_NAME):$(IMAGE_TAG)"
                    grep "image:" "$MANIFEST"
                  displayName: 'Inject image tag into deployment.yaml'

                # ── Apply ConfigMap ────────────────────────────
                - script: |
                    kubectl apply \
                      -f $(Pipeline.Workspace)/k8s/service-hpa-ingress.yaml \
                      --namespace=$(K8S_NAMESPACE)
                    echo "ConfigMap, Service, HPA, Ingress applied"
                  displayName: 'Apply ConfigMap · Service · HPA · Ingress'

                # ── Rolling Deployment ─────────────────────────
                - script: |
                    kubectl apply \
                      -f $(Pipeline.Workspace)/k8s/deployment.yaml \
                      --namespace=$(K8S_NAMESPACE)
                    echo "Deployment applied — rolling update started"
                  displayName: 'Apply Deployment (rolling update)'

                # ── Wait for rollout ───────────────────────────
                - script: |
                    echo "Waiting for rollout to complete..."
                    kubectl rollout status deployment/snowman-app \
                      --namespace=$(K8S_NAMESPACE) \
                      --timeout=300s
                    echo "Rollout complete"
                  displayName: 'Wait for rollout'

                # ── ALSO update docker-compose on the VM ──────
                # This keeps docker-compose in sync for manual use
                - script: |
                    cd $(Pipeline.Workspace)/docker-assets

                    # Write env file consumed by docker-compose
                    cat > .env.deploy << EOF
                    DOCKERHUB_USERNAME=$(DOCKERHUB_USERNAME)
                    IMAGE_TAG=$(IMAGE_TAG)
                    DB_ROOT_PASSWORD=$(DB_ROOT_PASSWORD)
                    DB_PASSWORD=$(DB_PASSWORD)
                    ACTIVEMQ_PASSWORD=$(ACTIVEMQ_PASSWORD)
                    EOF

                    echo "Docker Compose env file written for reference"
                    echo "Image deployed: $(IMAGE_NAME):$(IMAGE_TAG)"
                  displayName: 'Write docker-compose .env for reference'

# ================================================================
# STAGE 5 — SMOKE TEST
# ================================================================
  - stage: SmokeTest
    displayName: '5 · Smoke Test'
    dependsOn: DeployApp
    condition: succeeded()
    jobs:
      - job: SmokeJob
        displayName: 'Health checks · Cluster state'
        steps:

          - script: |
              echo "======= Pod Status ======="
              kubectl get pods -n $(K8S_NAMESPACE) -o wide

              echo "======= Services ========="
              kubectl get svc -n $(K8S_NAMESPACE)

              echo "======= HPA =============="
              kubectl get hpa -n $(K8S_NAMESPACE)

              echo "======= Recent Events ====="
              kubectl get events -n $(K8S_NAMESPACE) \
                --sort-by='.lastTimestamp' | tail -20
            displayName: 'Print cluster state'

          # ── Health endpoint check (with retry) ────────────
          - script: |
              sleep 10
              NODE_IP=$(kubectl get nodes \
                -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')

              echo "Testing: http://${NODE_IP}:30080/actuator/health"

              MAX=10
              N=0
              until curl -sf "http://${NODE_IP}:30080/actuator/health" \
                         | grep -q '"status":"UP"'; do
                N=$((N+1))
                if [ $N -ge $MAX ]; then
                  echo "ERROR: Health check failed after $MAX attempts"
                  kubectl logs \
                    -l app=snowman-app \
                    -n $(K8S_NAMESPACE) \
                    --tail=60
                  exit 1
                fi
                echo "Attempt $N/$MAX — retrying in 15s..."
                sleep 15
              done

              echo "Health check PASSED — app is UP"
            displayName: 'Actuator /health endpoint check'

          # ── ActiveMQ admin check ───────────────────────────
          - script: |
              NODE_IP=$(kubectl get nodes \
                -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')

              curl -sf "http://${NODE_IP}:30161/admin" \
                   --user "admin:$(ACTIVEMQ_PASSWORD)" \
                   -o /dev/null \
                && echo "ActiveMQ admin UI reachable" \
                || echo "WARNING: ActiveMQ admin not reachable"
            displayName: 'ActiveMQ admin check'
            continueOnError: true

          # ── Print deployed image confirmation ──────────────
          - script: |
              echo "Deployed image:"
              kubectl get deployment snowman-app \
                -n $(K8S_NAMESPACE) \
                -o jsonpath='{.spec.template.spec.containers[0].image}'
              echo ""
            displayName: 'Confirm deployed image tag'

# ================================================================
# STAGE 6 — AUTO ROLLBACK  (triggers only on stage 4 or 5 failure)
# ================================================================
  - stage: Rollback
    displayName: '6 · Auto Rollback'
    dependsOn:
      - DeployApp
      - SmokeTest
    condition: |
      or(
        failed('DeployApp'),
        failed('SmokeTest')
      )
    jobs:
      - job: RollbackJob
        displayName: 'kubectl rollout undo'
        steps:

          - script: |
              echo "ROLLBACK TRIGGERED — reverting to previous revision"

              kubectl rollout undo deployment/snowman-app \
                --namespace=$(K8S_NAMESPACE)

              echo "Waiting for rollback to stabilise..."
              kubectl rollout status deployment/snowman-app \
                --namespace=$(K8S_NAMESPACE) \
                --timeout=180s

              echo "======= Pods after rollback ======="
              kubectl get pods -n $(K8S_NAMESPACE)

              echo "Rollback complete"
            displayName: 'Rollback to previous deployment revision'

          - script: |
              echo "##vso[task.logissue type=error]\
                Pipeline failed — auto-rolled back to previous image"
              echo "##vso[task.complete result=Failed;]\
                Rolled back due to failure in DeployApp or SmokeTest"
            displayName: 'Mark pipeline failed after rollback'

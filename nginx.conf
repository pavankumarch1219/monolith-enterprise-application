events {
    worker_connections 1024;
}

http {
    upstream snowman_backend {
        least_conn;
        server snowman-app-1:8080;
        server snowman-app-2:8080;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://snowman_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        location /health {
            proxy_pass http://snowman_backend/health;
        }
    }
}

# ============================================================
# ConfigMap — non-sensitive app environment variables
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: snowman-config
  namespace: snowman
data:
  DB_HOST:                  "mysql"
  DB_PORT:                  "3306"
  DB_NAME:                  "snowman"
  DB_USER:                  "snowman_user"
  ACTIVEMQ_HOST:            "activemq"
  ACTIVEMQ_PORT:            "61616"
  SERVER_PORT:              "8080"
  SPRING_PROFILES_ACTIVE:   "azure"
  JAVA_OPTS:                "-Xms256m -Xmx768m -XX:+UseG1GC"
---
# ============================================================
# Service — NodePort exposes app on VM port 30080
# Replaces NGINX container from docker-compose
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: snowman-svc
  namespace: snowman
spec:
  selector:
    app: snowman-app
  type: NodePort
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30080
---
# ============================================================
# HPA — auto-scales pods based on CPU / memory
# min 2 replicas (mirrors compose HA), max 6
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: snowman-hpa
  namespace: snowman
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: snowman-app
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# ============================================================
# Ingress — nginx-ingress-controller routes external traffic
# Replace snowman.yourdomain.com with VM IP or real domain
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: snowman-ingress
  namespace: snowman
  annotations:
    kubernetes.io/ingress.class:                    nginx
    nginx.ingress.kubernetes.io/rewrite-target:     /
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout:    "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout:    "60"
spec:
  rules:
    - host: snowman.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: snowman-svc
                port:
                  number: 80

# ============================================================
# MySQL 5.7 StatefulSet  (matches docker-compose image version)
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: snowman
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName: default   # uncomment if Azure Disk SC needed
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: snowman-mysql
  namespace: snowman
spec:
  serviceName: snowman-mysql
  replicas: 1
  selector:
    matchLabels:
      app: snowman-mysql
  template:
    metadata:
      labels:
        app: snowman-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:5.7
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: snowman-app-secrets
                  key: DB_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: snowman
            - name: MYSQL_USER
              value: snowman_user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: snowman-app-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -h localhost -u root -p$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysql -h localhost -u snowman_user -p$MYSQL_PASSWORD -e 'SELECT 1'"
            initialDelaySeconds: 20
            periodSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: snowman
spec:
  selector:
    app: snowman-mysql
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None   # headless for StatefulSet DNS
 

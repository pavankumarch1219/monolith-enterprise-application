# =============================================================
# ConfigMap — non-sensitive environment config
# =============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: snowman-config
  namespace: snowman
  labels:
    app: snowman
    component: config
data:
  # Database
  DB_HOST: "snowman-mysql"
  DB_PORT: "3306"
  DB_NAME: "snowman"
  DB_USER: "snowman_user"

  # ActiveMQ
  ACTIVEMQ_HOST: "snowman-activemq"
  ACTIVEMQ_PORT: "61616"
  ACTIVEMQ_USER: "admin"

  # App
  SERVER_PORT: "8080"
  SPRING_PROFILES_ACTIVE: "azure"
  JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"

  # Logging
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_COM_SNOWMAN: "DEBUG"

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: monolith-hpa
  namespace: monolith
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: monolith-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
